mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "WS-CF-BACKUP"
    type: vless
    server: ws.moyou0929.me
    port: 443
    uuid: 83095547-86a0-4acf-b655-a2cb3ed5e794
    udp: true
    tls: true
    servername: ws.moyou0929.me
    network: ws
    ws-opts:
      path: /moyou-ws-backup
      headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    client-fingerprint: chrome

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "WS-CF-BACKUP"
      - DIRECT

rules:
  - MATCH,MAIN