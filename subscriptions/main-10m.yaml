mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  # 正式订阅每次更新后回到当前默认顺序，避免长期卡在历史测试入口。
  store-selected: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  # 正式主链路统一成单一的 443/TLS + WS。
  # 只保留 IP 直连，减少 DNS、端口和节点选择带来的变量。
  - name: "DE-WS-443-IP"
    type: vless
    server: 159.65.123.94
    port: 443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-WS-443-IP"

rules:
  - MATCH,MAIN
