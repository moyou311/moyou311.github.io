mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

profile:
  # 正式订阅每次更新后回到当前默认顺序，避免长期卡在历史测试入口。
  store-selected: false

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  # 正式主链路回到现网更成熟的 8443/TLS + WS。
  # 这条路已经在俄罗斯侧多次命中过服务器 /ws，吞吐比当前 HTTPUpgrade 更稳。
  - name: "DE-WS-DOMAIN"
    type: vless
    server: de-xr.moyou0929.me
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me

  # 同主线保留 IP 暴露面，便于在 DNS 侧异常时直接切换。
  - name: "DE-WS-IP"
    type: vless
    server: 159.65.123.94
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-WS-DOMAIN"
      - "DE-WS-IP"
      - "DIRECT"

rules:
  - MATCH,MAIN
