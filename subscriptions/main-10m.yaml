mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "WS-CF-XHTTP-H2"
    type: vless
    server: ws.moyou0929.me
    port: 443
    uuid: 83095547-86a0-4acf-b655-a2cb3ed5e794
    udp: true
    tls: true
    alpn:
      - h2
    servername: ws.moyou0929.me
    network: xhttp
    xhttp-opts:
      host: ws.moyou0929.me
      path: /moyou-ws-93c4a12d
      mode: auto
      reuse-settings:
        max-concurrency: "16-32"
        c-max-reuse-times: "0"
        h-max-reusable-secs: "1800-3000"
      headers:
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    client-fingerprint: chrome

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "WS-CF-XHTTP-H2"
      - DIRECT

rules:
  - MATCH,MAIN
