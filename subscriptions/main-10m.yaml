mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  # 正式订阅每次更新后回到当前默认顺序，避免长期卡在历史测试入口。
  store-selected: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  # 正式主链路：443/TLS + XHTTP。
  # 需要客户端使用支持 xhttp 的 Mihomo 版本，先升级客户端再下发正式订阅。
  - name: "DE-XHTTP-IP"
    type: vless
    server: 159.65.123.94
    port: 443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    alpn:
      - h2
    network: xhttp
    client-fingerprint: chrome
    encryption: ""
    xhttp-opts:
      path: /api/v3/sync
      host: de-xr.moyou0929.me
      mode: packet-up

  # 同一条主线保留域名暴露面，用于区分 DNS 问题与单 IP 问题。
  - name: "DE-XHTTP-DOMAIN"
    type: vless
    server: de-xr.moyou0929.me
    port: 443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    alpn:
      - h2
    network: xhttp
    client-fingerprint: chrome
    encryption: ""
    xhttp-opts:
      path: /api/v3/sync
      host: de-xr.moyou0929.me
      mode: packet-up

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-XHTTP-IP"
      - "DE-XHTTP-DOMAIN"
      - "DIRECT"

rules:
  - MATCH,MAIN
