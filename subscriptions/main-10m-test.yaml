mixed-port: 7890
allow-lan: false
mode: rule
log-level: debug
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: false

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "DE-XHTTP-IP"
    type: vless
    server: 159.65.123.94
    port: 443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    alpn:
      - h2
    network: xhttp
    client-fingerprint: chrome
    encryption: ""
    xhttp-opts:
      path: /api/v3/sync
      host: de-xr.moyou0929.me
      mode: packet-up

  - name: "DE-XHTTP-DOMAIN"
    type: vless
    server: de-xr.moyou0929.me
    port: 443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    alpn:
      - h2
    network: xhttp
    client-fingerprint: chrome
    encryption: ""
    xhttp-opts:
      path: /api/v3/sync
      host: de-xr.moyou0929.me
      mode: packet-up

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-XHTTP-IP"
      - "DE-XHTTP-DOMAIN"
      - "DIRECT"

rules:
  - MATCH,MAIN
