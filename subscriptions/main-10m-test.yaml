mixed-port: 7890
allow-lan: false
mode: rule
log-level: debug
ipv6: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: false

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxies:
  - name: "DE-WS-DOMAIN"
    type: vless
    server: de-xr.moyou0929.me
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me

  - name: "DE-WS-IP"
    type: vless
    server: 159.65.123.94
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    client-fingerprint: chrome
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-WS-DOMAIN"
      - "DE-WS-IP"
      - "DIRECT"

rules:
  - MATCH,MAIN
