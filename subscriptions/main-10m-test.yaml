mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: false

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  default-nameserver:
    - 77.88.8.8
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - 77.88.8.8
    - 1.1.1.1
  direct-nameserver:
    - 77.88.8.8
    - 77.88.8.1
    - 223.5.5.5
  nameserver:
    - "https://1.1.1.1/dns-query#RULES"
    - "https://8.8.8.8/dns-query#RULES"
  fallback:
    - "tls://1.1.1.1#RULES"
    - "tls://8.8.8.8#RULES"

proxies:
  - name: "DE-WS-IP"
    type: vless
    server: 159.65.123.94
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    cipher: none
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me
    client-fingerprint: chrome

  - name: "DE-WS-IPV6"
    type: vless
    server: "2a03:b0c0:3:f0:0:2:4b39:b000"
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    cipher: none
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me
    client-fingerprint: chrome

  - name: "DE-WS-DOMAIN"
    type: vless
    server: de-xr.moyou0929.me
    port: 8443
    uuid: "83095547-86a0-4acf-b655-a2cb3ed5e794"
    cipher: none
    udp: true
    tls: true
    servername: de-xr.moyou0929.me
    network: ws
    ws-opts:
      path: /ws
      headers:
        Host: de-xr.moyou0929.me
    client-fingerprint: chrome

proxy-groups:
  - name: "MAIN"
    type: select
    proxies:
      - "DE-WS-IP"
      - "DE-WS-IPV6"
      - "DE-WS-DOMAIN"
      - "DIRECT"

rules:
  - GEOIP,CN,DIRECT
  - MATCH,MAIN
